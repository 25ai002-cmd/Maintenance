<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Society Management Pro - Multi Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        html { scroll-behavior: smooth; }
        .hidden { display: none; }
        .admin-only { display: none; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); }
        
        body { background-color: #0f172a; color: white; font-family: sans-serif; }
        .card-bg { background-color: #1e293b; border: 1px solid #334155; }
        .input-field { background-color: #0f172a; border: 1px solid #1e293b; color: white; outline: none; }
        .btn-cyan { background-color: #22D3EE; color: #0f172a; font-weight: 800; transition: transform 0.1s; }
        .btn-cyan:active { transform: scale(0.98); }

        .status-pill-paid { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-pill-pending { background: rgba(244, 63, 94, 0.2); color: #f43f5e; }
        
        .clickable-row { cursor: pointer; transition: background-color 0.2s; }
        .clickable-row:hover { background-color: rgba(30, 41, 59, 0.8) !important; }
        
        #qrDisplay { max-width: 150px; margin: 0 auto; display: block; border-radius: 12px; }
    </style>
</head>
<body>

    <div id="setupInterface" class="min-h-screen flex items-center justify-center p-6">
        <div class="card-bg p-10 rounded-[40px] shadow-2xl w-full max-w-lg">
            <h2 id="setupTitle" class="text-3xl font-bold text-[#22D3EE] mb-4">Society Setup</h2>
            <p id="setupDesc" class="text-gray-400 text-sm mb-8">Enter a name to create a new society or switch to an existing one.</p>
            
            <div class="space-y-4">
                <input id="setupSocietyName" type="text" placeholder="Society Name" class="input-field w-full p-4 rounded-2xl text-lg">
                
                <div id="configFields" class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="setupBlocks" type="number" placeholder="Blocks" class="input-field w-full p-4 rounded-2xl text-lg">
                        <input id="setupFlats" type="number" placeholder="Flats/Block" class="input-field w-full p-4 rounded-2xl text-lg">
                    </div>
                    <input id="setupUser" type="text" placeholder="Set Admin Username" class="input-field w-full p-4 rounded-2xl text-lg">
                    <input id="setupPass" type="password" placeholder="Set Admin Password" class="input-field w-full p-4 rounded-2xl text-lg">
                </div>

                <button id="mainSetupBtn" onclick="runSetup()" class="btn-cyan w-full py-5 rounded-2xl text-xl mt-4">Initialize Society</button>
                
                <div class="mt-6 text-center">
                    <p id="toggleText" class="text-gray-400 text-sm">
                        Already have your society data? 
                        <button onclick="toggleLoginMode()" class="text-cyan-400 font-bold hover:underline">Login here</button>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div id="loginInterface" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="card-bg p-12 rounded-[50px] shadow-2xl w-full max-w-md text-center">
            <div class="mb-4">
                <span class="text-xs text-cyan-400 font-bold uppercase tracking-widest">Active Society</span>
                <h2 id="loginSocietyHeading" class="text-3xl font-bold text-white mt-1">Login</h2>
            </div>
            <div class="space-y-5">
                <input id="loginUser" type="text" placeholder="Username" class="input-field w-full p-5 rounded-2xl text-lg">
                <input id="loginPass" type="password" placeholder="Password" class="input-field w-full p-5 rounded-2xl text-lg">
                <button onclick="attemptLogin()" class="btn-cyan w-full py-5 rounded-2xl text-xl mt-4">Access Dashboard</button>
                <div class="mt-6">
                    <button onclick="handleLogout()" class="text-gray-500 text-sm hover:text-cyan-400 underline decoration-dotted">Back to Setup</button>
                </div>
            </div>
        </div>
    </div>

    <div id="dashboardInterface" class="hidden">
        <header class="bg-[#020617] p-5 sticky top-0 z-50 border-b border-gray-800">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <button onclick="toggleBankModal()" class="bg-cyan-600 p-2.5 rounded-xl">🏦</button>
                    <h1 id="societyTitle" class="text-xl md:text-2xl font-bold text-[#22D3EE]">Society</h1>
                </div>
                <div class="flex items-center gap-2">
                    <select id="viewMonth" onchange="displayFlats()" class="bg-[#1e293b] text-xs text-cyan-400 p-2 rounded-lg border border-slate-700">
                        <option>January</option><option>February</option><option>March</option>
                        <option>April</option><option>May</option><option>June</option>
                        <option>July</option><option>August</option><option>September</option>
                        <option>October</option><option>November</option><option>December</option>
                    </select>
                    <select id="viewYear" onchange="displayFlats()" class="bg-[#1e293b] text-xs text-cyan-400 p-2 rounded-lg border border-slate-700"></select>
                    <button onclick="exportToExcel()" class="bg-emerald-600 hover:bg-emerald-500 px-3 py-2 rounded-lg text-xs font-bold transition-colors">📥 Excel</button>
                    <button onclick="handleLogout()" class="bg-rose-600 hover:bg-rose-500 px-4 py-2 rounded-lg text-xs font-bold transition-colors">Logout</button>
                </div>
            </div>
        </header>

        <main class="p-6 max-w-[1600px] mx-auto">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 text-center">
                <div class="card-bg p-5 rounded-2xl"><h3 id="totalOccupied" class="text-2xl font-bold">0</h3><p class="text-xs text-gray-400">Occupied</p></div>
                <div class="bg-emerald-900/20 p-5 rounded-2xl border border-emerald-800/50"><h3 id="paidCount" class="text-2xl font-bold text-emerald-400">0</h3><p class="text-xs text-emerald-500">Paid</p></div>
                <div class="bg-rose-900/20 p-5 rounded-2xl border border-rose-800/50"><h3 id="pendingCount" class="text-2xl font-bold text-rose-400">0</h3><p class="text-xs text-rose-500">Pending</p></div>
                <div class="bg-amber-900/20 p-5 rounded-2xl border border-amber-800/50"><h3 id="rentalCount" class="text-2xl font-bold text-amber-400">0</h3><p class="text-xs text-amber-500">Rentals</p></div>
            </div>

            <input type="text" id="searchBox" onkeyup="searchFlat()" placeholder="Search names or flats..." class="w-full p-4 rounded-2xl input-field mb-8">

            <div class="card-bg rounded-3xl overflow-hidden mb-12">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900/80 text-gray-500 uppercase text-[10px]">
                            <tr>
                                <th class="p-5">Flat</th><th class="p-5">Owner</th><th class="p-5">Phone</th><th class="p-5">Status</th><th class="p-5">Amount</th><th class="p-5 text-center">Action</th>
                            </tr>
                        </thead>
                        <tbody id="dashboardTable" class="divide-y divide-gray-800"></tbody>
                    </table>
                </div>
            </div>

            <div id="adminForm" class="admin-only card-bg p-10 rounded-3xl max-w-5xl mx-auto mb-20 shadow-xl">
                <h2 class="text-2xl font-bold text-[#22D3EE] mb-8">Update Maintenance</h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 p-6 bg-[#0f172a] rounded-2xl">
                    <div><label class="text-[10px] text-gray-500 font-bold uppercase">Month</label><select id="editMonth" onchange="loadFlatData()" class="w-full p-4 rounded-xl input-field"></select></div>
                    <div><label class="text-[10px] text-gray-500 font-bold uppercase">Year</label><select id="editYear" onchange="loadFlatData()" class="w-full p-4 rounded-xl input-field"></select></div>
                    <div><label class="text-[10px] text-gray-500 font-bold uppercase">Block</label><select id="block" onchange="loadFlatData()" class="w-full p-4 rounded-xl input-field"></select></div>
                    <div><label class="text-[10px] text-gray-500 font-bold uppercase">Flat</label><select id="flatNumber" onchange="loadFlatData()" class="w-full p-4 rounded-xl input-field"></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <input id="ownerName" type="text" placeholder="Owner Name" class="w-full p-4 rounded-xl input-field">
                    <input id="phone" type="text" placeholder="Phone" class="w-full p-4 rounded-xl input-field">
                    <select id="maintenance" class="w-full p-4 rounded-xl input-field"><option value="Pending">Pending</option><option value="Paid">Paid</option></select>
                    <input id="maintenanceAmount" type="number" placeholder="Amount" class="w-full p-4 rounded-xl input-field">
                    <input id="flatDueDate" type="date" class="w-full p-4 rounded-xl input-field">
                    <input id="rentalName" type="text" placeholder="Rental Name (Optional)" class="w-full p-4 rounded-xl input-field">
                </div>
                <button onclick="saveFlat()" class="mt-8 btn-cyan px-12 py-4 rounded-2xl w-full md:w-auto">Save Changes</button>
            </div>
        </main>
    </div>

    <div id="bankModal" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-[100]" onclick="toggleBankModal()">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm"></div>
        <div class="card-bg w-11/12 max-w-md p-8 rounded-3xl relative" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold text-[#22D3EE] mb-4 text-center">Payment Gateway</h3>
            
            <div id="bankView" class="bg-[#0f172a] p-5 rounded-xl mb-6 border border-slate-700 text-center">
                <img id="qrDisplay" class="hidden mb-4" alt="QR Code">
                <p id="vBank" class="text-white font-bold text-lg mb-1">Not Set</p>
                <p id="vAcc" class="text-cyan-400 font-mono text-sm mb-1">Not Set</p>
                <p id="vIfsc" class="text-gray-400 font-mono text-xs uppercase">Not Set</p>
            </div>

            <div class="admin-only space-y-3">
                <hr class="border-gray-700 my-4">
                <label class="text-[10px] text-gray-500 font-bold uppercase block">Bank Details</label>
                <input id="ebank" placeholder="Account Holder" class="w-full p-3 input-field rounded-xl">
                <input id="eacc" placeholder="Account Number" class="w-full p-3 input-field rounded-xl">
                <input id="eifsc" placeholder="IFSC Code" class="w-full p-3 input-field rounded-xl">
                
                <label class="text-[10px] text-gray-500 font-bold uppercase block mt-4">Upload QR Code</label>
                <input type="file" id="eqr" accept="image/*" class="w-full text-xs text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-semibold file:bg-cyan-900/30 file:text-cyan-400 hover:file:bg-cyan-900/50">
                
                <button onclick="saveBank()" class="w-full bg-emerald-600 py-3 rounded-xl font-bold text-white mt-4">Save Payment Setup</button>
            </div>
        </div>
    </div>

    <script>
        let currentSociety = "";
        let isAdmin = false;
        let isLoginOnly = false;
        let vault = JSON.parse(localStorage.getItem('societyVault')) || {};

        function init() {
            const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const now = new Date();
            const currentYear = now.getFullYear();

            const viewYear = document.getElementById('viewYear');
            const editYear = document.getElementById('editYear');
            for(let y = currentYear - 2; y <= currentYear + 5; y++) {
                viewYear.add(new Option(y, y));
                editYear.add(new Option(y, y));
            }
            viewYear.value = currentYear;
            editYear.value = currentYear;

            document.getElementById('viewMonth').value = months[now.getMonth()];
            const editMonthSelect = document.getElementById('editMonth');
            months.forEach(m => editMonthSelect.add(new Option(m, m)));
            editMonthSelect.value = months[now.getMonth()];

            const sessionSociety = sessionStorage.getItem('activeSociety');
            if (sessionSociety && vault[sessionSociety]) {
                currentSociety = sessionSociety;
                isAdmin = true;
                loadDashboard();
            }
        }

        function handleLogout() {
            sessionStorage.clear();
            window.location.reload();
        }

        function toggleLoginMode() {
            isLoginOnly = !isLoginOnly;
            const config = document.getElementById('configFields'), title = document.getElementById('setupTitle'), desc = document.getElementById('setupDesc'), btn = document.getElementById('mainSetupBtn'), toggle = document.getElementById('toggleText');
            if (isLoginOnly) {
                config.classList.add('hidden'); title.innerText = "Society Login"; desc.innerText = "Enter your society name to access existing records."; btn.innerText = "Go to Login";
                toggle.innerHTML = `Need to create a new one? <button onclick="toggleLoginMode()" class="text-cyan-400 font-bold hover:underline">Start here</button>`;
            } else {
                config.classList.remove('hidden'); title.innerText = "Society Setup"; desc.innerText = "Enter a name to create a new society or switch to an existing one."; btn.innerText = "Initialize Society";
                toggle.innerHTML = `Already have your society data? <button onclick="toggleLoginMode()" class="text-cyan-400 font-bold hover:underline">Login here</button>`;
            }
        }

        function runSetup() {
            const name = document.getElementById('setupSocietyName').value.trim();
            if(!name) return alert("Please enter a society name.");
            if (!isLoginOnly) {
                if (vault[name]) return alert("Name exists! Use login.");
                vault[name] = {
                    config: { blocks: document.getElementById('setupBlocks').value || 1, flats: document.getElementById('setupFlats').value || 1, user: document.getElementById('setupUser').value || "admin", pass: document.getElementById('setupPass').value || "123" },
                    apartmentData: {}, bank: {}
                };
                for(let i=0; i<parseInt(vault[name].config.blocks); i++) vault[name].apartmentData[String.fromCharCode(65+i)] = {};
                saveVault(); alert("New Society Initialized!");
            } else { if (!vault[name]) return alert("Not found."); }
            currentSociety = name;
            document.getElementById('loginSocietyHeading').innerText = name;
            document.getElementById('setupInterface').classList.add('hidden');
            document.getElementById('loginInterface').classList.remove('hidden');
        }

        function attemptLogin() {
            const soc = vault[currentSociety];
            if (document.getElementById('loginUser').value === soc.config.user && document.getElementById('loginPass').value === soc.config.pass) {
                isAdmin = true; sessionStorage.setItem('activeSociety', currentSociety); loadDashboard();
            } else alert("Invalid Credentials.");
        }

        function loadDashboard() {
            document.getElementById('loginInterface').classList.add('hidden');
            document.getElementById('setupInterface').classList.add('hidden');
            document.getElementById('dashboardInterface').classList.remove('hidden');
            if(isAdmin) document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'block');
            document.getElementById('societyTitle').innerText = currentSociety;
            generateDropdowns(); displayFlats(); loadBank();
        }

        function generateDropdowns() { 
            const soc = vault[currentSociety], bs = document.getElementById('block'), fs = document.getElementById('flatNumber'); bs.innerHTML = ''; fs.innerHTML = '';
            for (let i = 0; i < parseInt(soc.config.blocks); i++) bs.add(new Option('Block ' + String.fromCharCode(65+i), String.fromCharCode(65+i)));
            for (let i = 1; i <= parseInt(soc.config.flats); i++) fs.add(new Option('Flat ' + i, i));
            loadFlatData();
        }

        function displayFlats() {
            const tbody = document.getElementById('dashboardTable'); tbody.innerHTML = '';
            const soc = vault[currentSociety], periodKey = `${document.getElementById('viewMonth').value}-${document.getElementById('viewYear').value}`;
            let counts = { occ: 0, pa: 0, pe: 0, r: 0 };
            Object.keys(soc.apartmentData).sort().forEach(b => {
                for (let i = 1; i <= parseInt(soc.config.flats); i++) {
                    const d = soc.apartmentData[b][i] || {}, isOcc = d.owner?.trim(), monthData = (d.months && d.months[periodKey]) ? d.months[periodKey] : { status: 'Pending', amount: 0 };
                    if(isOcc) { counts.occ++; monthData.status === 'Paid' ? counts.pa++ : counts.pe++; if(d.rentalName) counts.r++; }
                    const btnClass = monthData.status === 'Paid' ? 'bg-emerald-600' : 'bg-rose-600', btnText = monthData.status === 'Paid' ? 'Receipt' : 'Reminder';
                    let row = tbody.insertRow();
                    row.className = "hover:bg-slate-800/40 clickable-row";
                    row.onclick = () => scrollToEdit(b, i);
                    row.innerHTML = `<td class="p-5 font-bold text-cyan-400">${b}-${i}</td><td class="p-5 font-semibold">${isOcc ? d.owner : '<span class="text-slate-600">Empty</span>'}</td><td class="p-5 font-mono text-xs text-gray-400">${isOcc ? (d.phone || '-') : '-'}</td><td class="p-5">${isOcc ? `<span class="px-3 py-1 rounded-full text-[10px] font-bold ${monthData.status === 'Paid' ? 'status-pill-paid' : 'status-pill-pending'}">${monthData.status}</span>` : '-'}</td><td class="p-5 font-mono">₹${monthData.amount || '0'}</td><td class="p-5 text-center">${isOcc ? `<button onclick="event.stopPropagation(); sendWhatsApp('${d.phone}', '${monthData.status}', '${d.owner}', '${monthData.amount}')" class="${btnClass} p-2 px-4 rounded-lg text-[10px] font-bold uppercase transition-transform active:scale-95">💬 ${btnText}</button>` : '-'}</td>`;
                }
            });
            document.getElementById('totalOccupied').innerText = counts.occ; document.getElementById('paidCount').innerText = counts.pa; document.getElementById('pendingCount').innerText = counts.pe; document.getElementById('rentalCount').innerText = counts.r;
        }

        function saveFlat() {
            const soc = vault[currentSociety], b = document.getElementById('block').value, f = document.getElementById('flatNumber').value, key = `${document.getElementById('editMonth').value}-${document.getElementById('editYear').value}`;
            if(!soc.apartmentData[b][f]) soc.apartmentData[b][f] = { months: {} };
            Object.assign(soc.apartmentData[b][f], { owner: document.getElementById('ownerName').value, phone: document.getElementById('phone').value, rentalName: document.getElementById('rentalName').value });
            if(!soc.apartmentData[b][f].months) soc.apartmentData[b][f].months = {};
            soc.apartmentData[b][f].months[key] = { status: document.getElementById('maintenance').value, amount: document.getElementById('maintenanceAmount').value, dueDate: document.getElementById('flatDueDate').value };
            saveVault(); displayFlats(); alert("Record Saved");
        }

        function loadFlatData() {
            const soc = vault[currentSociety], b = document.getElementById('block').value, f = document.getElementById('flatNumber').value, key = `${document.getElementById('editMonth').value}-${document.getElementById('editYear').value}`;
            const d = soc.apartmentData[b][f] || { months: {} };
            document.getElementById('ownerName').value = d.owner || ''; document.getElementById('phone').value = d.phone || ''; document.getElementById('rentalName').value = d.rentalName || '';
            const m = (d.months && d.months[key]) ? d.months[key] : {};
            document.getElementById('maintenance').value = m.status || 'Pending'; document.getElementById('maintenanceAmount').value = m.amount || 0; document.getElementById('flatDueDate').value = m.dueDate || '';
        }

        function saveVault() { localStorage.setItem('societyVault', JSON.stringify(vault)); }
        
        async function saveBank() {
            const qrInput = document.getElementById('eqr');
            let qrData = vault[currentSociety].bank?.q || null;
            
            if (qrInput.files && qrInput.files[0]) {
                const reader = new FileReader();
                qrData = await new Promise(resolve => {
                    reader.onload = e => resolve(e.target.result);
                    reader.readAsDataURL(qrInput.files[0]);
                });
            }

            vault[currentSociety].bank = {
                n: document.getElementById('ebank').value,
                a: document.getElementById('eacc').value,
                i: document.getElementById('eifsc').value,
                q: qrData
            };
            saveVault(); alert("Payment Info Updated"); loadBank();
        }

        function loadBank() {
            const b = vault[currentSociety].bank || {};
            document.getElementById('vBank').innerText = b.n || 'Not Set';
            document.getElementById('vAcc').innerText = b.a || 'Not Set';
            document.getElementById('vIfsc').innerText = b.i || 'Not Set';
            
            const qrImg = document.getElementById('qrDisplay');
            if(b.q) { qrImg.src = b.q; qrImg.classList.remove('hidden'); }
            else { qrImg.classList.add('hidden'); }
        }

        function toggleBankModal() { document.getElementById('bankModal').classList.toggle('opacity-0'); document.getElementById('bankModal').classList.toggle('pointer-events-none'); }
        function searchFlat() { const v = document.getElementById('searchBox').value.toLowerCase(); document.querySelectorAll('#dashboardTable tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(v) ? '' : 'none'); }
        function scrollToEdit(block, flat) { document.getElementById('block').value = block; document.getElementById('flatNumber').value = flat; document.getElementById('editMonth').value = document.getElementById('viewMonth').value; document.getElementById('editYear').value = document.getElementById('viewYear').value; loadFlatData(); document.getElementById('adminForm').scrollIntoView({ behavior: 'smooth' }); }

        function sendWhatsApp(phone, status, owner, amount) {
            if(!phone) return alert("No phone number");
            const m = document.getElementById('viewMonth').value, y = document.getElementById('viewYear').value;
            const text = status === 'Paid' ? `Receipt: Maintenance ₹${amount} for ${m} ${y} received for ${currentSociety}.` : `Reminder: Maintenance ₹${amount} for ${m} ${y} is pending for ${currentSociety}.`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`);
        }

        function exportToExcel() {
            const soc = vault[currentSociety], m = document.getElementById('viewMonth').value, y = document.getElementById('viewYear').value;
            let rows = [];
            Object.keys(soc.apartmentData).forEach(b => {
                for(let i=1; i<=parseInt(soc.config.flats); i++){
                    let f = soc.apartmentData[b][i] || {}, md = (f.months && f.months[`${m}-${y}`]) || {};
                    rows.push({Flat: `${b}-${i}`, Owner: f.owner||'Empty', Phone: f.phone||'-', Status: md.status||'Pending', Amount: md.amount||0});
                }
            });
            const ws = XLSX.utils.json_to_sheet(rows), wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Records"); XLSX.writeFile(wb, `${currentSociety}_${m}_${y}.xlsx`);
        }

        init();
    </script>
</body>
</html>
